name = "ismynbncooked-terms-sync"
main = "src/index.ts"
compatibility_date = "2026-03-01"

[observability.logs]
enabled = true
invocation_logs = true

[triggers]
crons = ["0 8 * * SUN"]

[[r2_buckets]]
binding = "DATA_BUCKET"
bucket_name = "ismynbncooked-data"

[[queues.producers]]
binding = "TERMS_QUEUE"
queue = "ismynbncooked-terms"

[[queues.consumers]]
queue = "ismynbncooked-terms"
max_batch_size = 1
max_concurrency = 1
max_retries = 2
