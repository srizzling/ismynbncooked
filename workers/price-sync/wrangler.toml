name = "ismynbncooked-price-sync"
main = "src/index.ts"
compatibility_date = "2026-03-01"

[observability.logs]
enabled = true
invocation_logs = true

[triggers]
crons = ["0 6 * * *"]

[[r2_buckets]]
binding = "DATA_BUCKET"
bucket_name = "ismynbncooked-data"

[vars]
# NETBARGAINS_API_KEY set via `wrangler secret put NETBARGAINS_API_KEY`
# FIRECRAWL_API_KEY set via `wrangler secret put FIRECRAWL_API_KEY`
