name = "ismynbncooked-prices-sync"
main = "src/index.ts"
compatibility_date = "2026-03-01"

[observability.logs]
enabled = true
invocation_logs = true

[triggers]
crons = ["0 9 * * MON"]

[[r2_buckets]]
binding = "DATA_BUCKET"
bucket_name = "ismynbncooked-data"

[vars]
# FIRECRAWL_API_KEY set via `wrangler secret put FIRECRAWL_API_KEY`
