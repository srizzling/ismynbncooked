name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  setup-infra:
    name: Ensure R2 Bucket
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create R2 bucket (if not exists)
        run: npx wrangler r2 bucket create ismynbncooked-data 2>&1 || true

      - name: Create Pages project (if not exists)
        run: npx wrangler pages project create ismynbncooked --production-branch main 2>&1 || true

  deploy-workers:
    name: Deploy Workers
    needs: setup-infra
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker:
          - name: price-sync
            path: workers/price-sync
          - name: terms-sync
            path: workers/terms-sync
          - name: prices-sync
            path: workers/prices-sync
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy ${{ matrix.worker.name }}
        working-directory: ${{ matrix.worker.path }}
        run: pnpm exec wrangler deploy

  deploy-site:
    name: Deploy Site
    runs-on: ubuntu-latest
    needs: [setup-infra, deploy-workers]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Astro site
        working-directory: site
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        working-directory: site
        run: pnpm exec wrangler pages deploy dist/
